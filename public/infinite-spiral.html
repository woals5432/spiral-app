<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>무한 확장 텍스트 소용돌이 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 모양이 깨지지 않게 폰트와 줄간격을 꽉 잡아줍니다 */
      #output {
        font-family: "Courier New", "돋움체", Dotum, monospace;
        white-space: pre;
        line-height: 1.2;
        letter-spacing: 0;
      }
      /* 스크롤바 디자인 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-6">
      <h1 class="text-2xl font-bold text-center mb-2 text-gray-800">
        🌀 무한 소용돌이 생성기
      </h1>
      <p class="text-sm text-gray-500 text-center mb-6">
        글자 수 제한 없이, 입력한 길이만큼 부드럽고 둥글게 말려들어갑니다.
      </p>

      <div class="space-y-4">
        <!-- 텍스트 입력 영역 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >변환할 문구 (글자 수 무제한)</label
          >
          <textarea
            id="inputText"
            rows="3"
            oninput="generateDynamicSpiral()"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
          ></textarea>
          <div class="flex justify-end mt-1 text-sm text-gray-500">
            <span id="charCount">0 글자</span>
          </div>
        </div>

        <!-- 세부 설정 영역 -->
        <div
          class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200"
        >
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >나선 간격</label
            >
            <input
              type="range"
              id="spacingSlider"
              min="0.5"
              max="2.5"
              step="0.1"
              value="1.2"
              oninput="generateDynamicSpiral()"
              class="w-full cursor-pointer"
            />
            <div class="text-[11px] text-gray-500 mt-1">
              줄 사이의 여백 넓이
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >비율 보정 (찌그러짐 방지)</label
            >
            <input
              type="range"
              id="ratioSlider"
              min="0.8"
              max="2.0"
              step="0.1"
              value="1.3"
              oninput="generateDynamicSpiral()"
              class="w-full cursor-pointer"
            />
            <div class="text-[11px] text-gray-500 mt-1">
              결과가 타원이면 조절하세요
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >읽는 방향</label
            >
            <select
              id="directionSelect"
              onchange="generateDynamicSpiral()"
              class="w-full p-2 border border-gray-300 rounded focus:outline-none text-sm"
            >
              <option value="outsideIn">밖에서 ➔ 안으로 (추천)</option>
              <option value="insideOut">안에서 ➔ 밖으로</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 결과 표시 영역 -->
      <div class="mt-6">
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >결과 (이 부분을 복사하세요)</label
        >
        <div
          class="bg-gray-900 rounded-lg p-6 flex justify-center overflow-auto min-h-[250px] max-h-[500px] items-center border-4 border-gray-800"
        >
          <div id="output" class="text-green-400 text-lg"></div>
        </div>

        <button
          onclick="copyToClipboard()"
          class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg transition text-lg shadow-lg"
        >
          클립보드에 복사하기
        </button>
      </div>
    </div>

    <script>
      function generateDynamicSpiral() {
        const rawText = document.getElementById("inputText").value;
        const text = rawText.replace(/\s/g, "").split("");
        document.getElementById("charCount").innerText =
          `총 ${text.length} 글자`;

        if (text.length === 0) {
          document.getElementById("output").innerText =
            "텍스트를 입력해주세요.";
          return;
        }

        // 설정값 가져오기
        const spacing = parseFloat(
          document.getElementById("spacingSlider").value,
        );
        const ratioX = parseFloat(document.getElementById("ratioSlider").value); // 텍스트 환경 세로길이 보정
        const isOutsideIn =
          document.getElementById("directionSelect").value === "outsideIn";
        const dir = isOutsideIn ? -1 : 1;

        let gridMap = new Map();
        let minX = 0,
          maxX = 0,
          minY = 0,
          maxY = 0;

        let theta = -Math.PI / 2; // 12시 방향에서 시작
        let totalAngle = 0;
        let r = 0.5; // 중심이 너무 뭉치지 않게 약간 띄움

        let lastX = null;
        let lastY = null;

        // 정교하게 다듬어진 아르키메데스 나선 (Archimedean spiral) 배치
        for (let i = 0; i < text.length; i++) {
          let char = isOutsideIn ? text[text.length - 1 - i] : text[i];
          let placed = false;

          // 궤적을 아주 미세하게 따라가면서 글자를 박을 적절한 자리를 찾습니다.
          while (!placed) {
            let cx = Math.round(r * ratioX * Math.cos(theta));
            let cy = Math.round(r * Math.sin(theta));
            let key = `${cx},${cy}`;

            // 해당 좌표가 비어있는지 확인
            if (!gridMap.has(key)) {
              let isFarEnough = true;

              // 이전 글자와의 거리를 계산하여 매끄러운 궤적 유지 (겹침/건너뜀 방지)
              if (lastX !== null && lastY !== null) {
                let distSq = Math.pow(cx - lastX, 2) + Math.pow(cy - lastY, 2);
                // 거리가 1칸 이상 벌어졌을 때만 배치
                if (distSq < 1) {
                  isFarEnough = false;
                }
              }

              if (isFarEnough) {
                gridMap.set(key, char);
                if (cx < minX) minX = cx;
                if (cx > maxX) maxX = cx;
                if (cy < minY) minY = cy;
                if (cy > maxY) maxY = cy;

                lastX = cx;
                lastY = cy;
                placed = true;
              }
            }

            // 각도를 아주 미세하게 움직임 (바깥일수록 더 촘촘히 탐색)
            let step = 0.1 / Math.max(1, r);
            theta += step * dir;
            totalAngle += step;

            // 반경은 총 회전 각도에 비례하여 일정하게 증가
            // spacing 값에 따라 한 바퀴 돌 때 넓어지는 폭이 결정됨
            r = 0.5 + (spacing * totalAngle) / (2 * Math.PI);
          }
        }

        const padding = 1;
        const rows = maxY - minY + 1 + padding * 2;
        const cols = maxX - minX + 1 + padding * 2;

        let grid = Array.from({ length: rows }, () => Array(cols).fill("　"));

        gridMap.forEach((char, key) => {
          let [cx, cy] = key.split(",").map(Number);
          grid[cy - minY + padding][cx - minX + padding] = char;
        });

        const result = grid.map((row) => row.join("")).join("\n");
        document.getElementById("output").innerText = result;
      }

      function copyToClipboard() {
        const content = document.getElementById("output").innerText;
        if (!content || content === "텍스트를 입력해주세요.") return;

        const textArea = document.createElement("textarea");
        textArea.value = content;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        document.body.removeChild(textArea);

        // alert("복사 성공! 어떤 길이의 글자든 그대로 붙여넣기 하시면 됩니다.");
      }

      window.onload = generateDynamicSpiral;
    </script>
  </body>
</html>
